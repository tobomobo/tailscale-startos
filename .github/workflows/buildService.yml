name: Build Service

on:
  workflow_dispatch:
  pull_request:
    paths-ignore: ['*.md']
    branches: ['main', 'master']
  push:
    paths-ignore: ['*.md']
    branches: ['main', 'master']

jobs:
  BuildPackage:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare StartOS SDK
        uses: Start9Labs/sdk@v2

      - name: Checkout services repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build the service package
        id: build
        run: |
          make
          PACKAGE_ID=$(awk -F"'" '/id:/ {print $2}' startos/manifest/index.ts)
          echo "package_id=$PACKAGE_ID" >> $GITHUB_ENV
          printf "\nSHA256SUMS:\n"
          sha256sum ${PACKAGE_ID}_*.s9pk
        shell: bash

      - name: Upload .s9pk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.package_id }}-s9pks
          path: ./${{ env.package_id }}_*.s9pk
